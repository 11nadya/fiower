<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Shopping Cart</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fffafb; text-align: center; padding: 20px; }
        .cart-box { background: white; border: 2px solid #f2a3b3; border-radius: 15px; padding: 20px; max-width: 500px; margin: auto; }
        .item-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .total-price { font-size: 1.5em; color: #c05a7a; margin-top: 20px; font-weight: bold; }
        .btn-home { display: inline-block; margin-top: 20px; color: #c05a7a; text-decoration: none; font-weight: bold; border: 1px solid #c05a7a; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>My Combined Cart 🛒</h1>
    <div class="cart-box" id="cart-list">
        </div>
    
    <button onclick="clearCart()" style="margin-top:20px; background:#999; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Empty Cart 🗑️</button>
    <br>
    <a href="flora.html" class="btn-home">Back to Home 🌸</a>
<button id="order-btn" onclick="sendOrderToCloud()" style="margin-top:20px; background:#28a745; color:white; border:none; padding:12px 20px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%; font-size:1.1em;">
    Confirm Order & Send to Cloud ☁️✅
</button>
<p id="order-status" style="text-align:center; font-weight:bold; margin-top:10px;"></p>
    <script>
        function loadFullCart() {
            const listDiv = document.getElementById('cart-list');
            let total = 0;
            let html = "";

            // قائمة شاملة لكل المنتجات اللي في صفحاتك (ورد + بالونات)
           const allProducts = [
    { id: 'qty_balloons1', name: 'Multicolor Balloons', price: 20 },
    { id: 'qty_balloons2', name: 'Party Balloons', price: 20 },
    { id: 'Pink Tulip', name: 'Pink Tulip', price: 10 },
    { id: 'Lily', name: 'Lily Flower', price: 15 },
    { id: 'Sunflower', name: 'Sunflower', price: 15 },
    { id: 'White Tulip', name: 'White Tulip', price: 10 },
    { id: 'Rose Bouquet', name: 'Rose Bouquet', price: 75 },
    { id: 'Tulip Bouquet', name: 'Tulip Bouquet', price: 85 }
];

            allProducts.forEach(product => {
                // نبحث في الذاكرة عن كل منتج
                let qty = parseInt(localStorage.getItem(product.id)) || 0;
                
                if (qty > 0) {
                    let cost = qty * product.price;
                    total += cost;
                    html += `
                        <div class="item-row">
                            <span>${product.name} (x${qty})</span>
                            <span>${cost} SR</span>
                        </div>`;
                }
            });

            listDiv.innerHTML = html || "<p>Your cart is empty! 🌸</p>";
            if (total > 0) {
                listDiv.innerHTML += `<div class="total-price">Total Amount: ${total} SR</div>`;
            }
        }

        function clearCart() {
            localStorage.clear();
            location.reload();
        }

        window.onload = loadFullCart;
    </script>
    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbtxONOkbqmuGu00JH9d94f9iTwoP4HNs",
        authDomain: "flower-shop-9eace.firebaseapp.com",
        projectId: "flower-shop-9eace",
        storageBucket: "flower-shop-9eace.firebasestorage.app",
        messagingSenderId: "837971089886",
        appId: "1:837971089886:web:a997cd377acb5b7af5e54f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function sendOrderToCloud() {
        const btn = document.getElementById('order-btn');
        const status = document.getElementById('order-status');
        let myOrder = [];

        const products = [
            { id: 'qty_balloons1', name: 'Multicolor Balloons' },
            { id: 'qty_balloons2', name: 'Party Balloons' },
            { id: 'Pink Tulip', name: 'Pink Tulip' },
            { id: 'Lily', name: 'Lily Flower' },
            { id: 'Sunflower', name: 'Sunflower' },
            { id: 'White Tulip', name: 'White Tulip' },
            { id: 'Rose Bouquet', name: 'Rose Bouquet' },
            { id: 'Tulip Bouquet', name: 'Tulip Bouquet' }
        ];

        products.forEach(p => {
            let qty = parseInt(localStorage.getItem(p.id)) || 0;
            if (qty > 0) {
                myOrder.push({ product: p.name, quantity: qty });
            }
        });

        if (myOrder.length === 0) {
            alert("السلة فاضية! اختاري ورد أول 🌸");
            return;
        }

        btn.disabled = true;
        btn.innerText = "جاري الإرسال للكلاود... ⏳";

        try {
            await addDoc(collection(db, "Orders"), {
                items: myOrder,
                timestamp: new Date().toLocaleString(),
                status: "New Order"
            });

            status.innerHTML = "Success! 🎉 <br> تم إرسال طلبك للكلاود بنجاح";
            status.style.color = "green";
            localStorage.clear(); 
            setTimeout(() => location.reload(), 3000);
        } catch (e) {
            console.error("Error: ", e);
            status.innerText = "خطأ في الإرسال، حاولي مرة ثانية";
            status.style.color = "red";
            btn.disabled = false;
            btn.innerText = "Confirm Order & Send to Cloud ☁️✅";
        }
    }

    window.sendOrderToCloud = sendOrderToCloud;
</script>
</body>
</html>
