<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Combined Cart 🛒</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fff0f3; padding: 20px; text-align: center; }
        .cart-container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 25px; border: 2px solid #f2a3b3; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        
        /* زر السهم العلوي للرجوع */
        .back-arrow {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #d63384;
            font-size: 24px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-arrow:hover { transform: scale(1.2); color: #ff4d6d; }

        h1 { color: #d63384; font-size: 28px; margin-bottom: 10px; margin-top: 10px; }
        
        /* زر الرجوع للمتجر تحت العنوان */
        .back-to-shop {
            display: inline-block;
            margin-bottom: 20px;
            color: #d63384;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #f2a3b3;
            padding: 5px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .back-to-shop:hover { background-color: #f2a3b3; color: white; }

        #cart-items-list { 
            border: 2px solid #f2a3b3; 
            border-radius: 15px; 
            padding: 15px; 
            margin-bottom: 10px; 
            text-align: left; 
            background-color: #fff;
        }

        .delete-item-btn { background: none; border: none; color: #ff4d6d; cursor: pointer; font-size: 18px; padding: 0 5px; }
        .empty-btn { background-color: #ff4d6d; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 20px; }

        .delivery-details { border: 1px solid #f2a3b3; padding: 15px; border-radius: 20px; margin-bottom: 20px; background-color: #fff9fa; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #d63384; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        
        #order-btn { background-color: #4caf50; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; cursor: pointer; font-weight: bold; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .item-info { display: flex; align-items: center; gap: 10px; }
        .total-row { text-align: right; font-weight: bold; margin-top: 10px; color: #d63384; font-size: 18px; }
    </style>
</head>
<body>

<div class="cart-container">
    <a href="index.html" class="back-arrow" title="Go Back">←</a>

    <h1>My Combined Cart 🛒</h1>
    
    <a href="index.html" class="back-to-shop">🌸 Continue Shopping</a>
    
    <div id="cart-items-list">
        <p style="text-align:center; color:#999;">Loading Flowers... 🌸</p>
    </div>

    <button class="empty-btn" onclick="clearCart()">Empty All Cart 🗑️</button>

    <div class="delivery-details">
        <h3>Delivery Details 🚚</h3>
        <div class="input-group">
            <label>Phone Number:</label>
            <input type="text" id="phone-input" placeholder="05xxxxxxxx">
        </div>
        <div class="input-group">
            <label>Location:</label>
            <input type="text" id="location-input" placeholder="City, Street...">
        </div>
        <div class="input-group">
            <label>Payment Method:</label>
            <select id="payment-input">
                <option value="Cash on Delivery">Cash on Delivery</option>
                <option value="Online Payment">Online Payment</option>
            </select>
        </div>
    </div>

    <button id="order-btn" onclick="sendOrderToCloud()">Confirm Order & Send to Cloud ☁️✅</button>
    <p id="order-status" style="margin-top: 15px; font-weight: bold;"></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbtxONOkbqmuGu00JH9d94f9iTwoP4HNs",
        authDomain: "flower-shop-9eace.firebaseapp.com",
        projectId: "flower-shop-9eace",
        storageBucket: "flower-shop-9eace.appspot.com",
        messagingSenderId: "837971089886",
        appId: "1:837971089886:web:a997cd377acb5b7af5e54f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const productsRef = [
        { id: 'qty_balloons1', name: 'Multicolor Balloons', price: 20 },
        { id: 'qty_balloons2', name: 'Party Balloons', price: 20 },
        { id: 'Pink Tulip', name: 'Pink Tulip', price: 10 },
        { id: 'Lily', name: 'Lily Flower', price: 15 },
        { id: 'Sunflower', name: 'Sunflower', price: 15 },
        { id: 'White Tulip', name: 'White Tulip', price: 10 },
        { id: 'Rose Bouquet', name: 'Rose Bouquet', price: 75 },
        { id: 'Tulip Bouquet', name: 'Tulip Bouquet', price: 85 }
    ];

    function loadFullCart() {
        const listDiv = document.getElementById('cart-items-list');
        let html = "";
        let total = 0;

        productsRef.forEach(p => {
            let qty = parseInt(localStorage.getItem(p.id)) || 0;
            if (qty > 0) {
                let cost = qty * p.price;
                total += cost;
                html += `
                    <div class="item-row">
                        <div class="item-info">
                            <button class="delete-item-btn" onclick="deleteOneItem('${p.id}')">🗑️</button>
                            <span>${p.name} (x${qty})</span>
                        </div>
                        <span>${cost} SR</span>
                    </div>`;
            }
        });

        listDiv.innerHTML = html || "<p style='text-align:center; color:#999;'>Your cart is empty! 🌸</p>";
        if (total > 0) {
            listDiv.innerHTML += `<div class="total-row">Total: ${total} SR</div>`;
        }
    }

    window.deleteOneItem = function(id) {
        localStorage.removeItem(id);
        loadFullCart();
    }

    window.clearCart = function() {
        if (confirm("Empty whole cart? 🗑️")) {
            productsRef.forEach(p => localStorage.removeItem(p.id));
            window.location.reload();
        }
    }

    window.sendOrderToCloud = async function() {
        const phone = document.getElementById('phone-input').value;
        const locationInput = document.getElementById('location-input').value;
        const payment = document.getElementById('payment-input').value;
        const statusText = document.getElementById('order-status');
        const btn = document.getElementById('order-btn');

        if (!phone || !locationInput) { alert("Fill details! 🌸"); return; }

        let myOrder = [];
        productsRef.forEach(p => {
            let qty = parseInt(localStorage.getItem(p.id)) || 0;
            if (qty > 0) myOrder.push({ product: p.name, quantity: qty });
        });

        if (myOrder.length === 0) { alert("Empty!"); return; }

        btn.disabled = true;
        btn.innerText = "Sending... ⌛";

        try {
            await addDoc(collection(db, "Orders"), {
                customerPhone: phone,
                customerLocation: locationInput,
                paymentMethod: payment,
                items: myOrder,
                timestamp: new Date().toLocaleString()
            });
            alert("Success!");
            productsRef.forEach(p => localStorage.removeItem(p.id));
            window.location.reload();
        } catch (e) {
            console.error(e);
            btn.disabled = false;
        }
    }

    window.onload = loadFullCart;
</script>

</body>
</html>
