<script type="module">
    // 1. Firebase Configuration (تأكدي أن الإعدادات مطابقة لمشروعك)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "your-app.firebaseapp.com",
        projectId: "your-project-id",
        storageBucket: "your-app.appspot.com",
        messagingSenderId: "123456789",
        appId: "1:12345:web:abc123"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 2. دالة عرض المنتجات في السلة (Load Cart)
    function loadFullCart() {
        const listDiv = document.getElementById('cart-items-list');
        if (!listDiv) return;

        let html = "";
        let total = 0;

        // قائمة بكل المنتجات الممكنة في موقعك
        const allProducts = [
            { id: 'qty_balloons1', name: 'Multicolor Balloons', price: 20 },
            { id: 'qty_balloons2', name: 'Party Balloons', price: 20 },
            { id: 'Pink Tulip', name: 'Pink Tulip', price: 10 },
            { id: 'Lily', name: 'Lily Flower', price: 15 },
            { id: 'Sunflower', name: 'Sunflower', price: 15 },
            { id: 'White Tulip', name: 'White Tulip', price: 10 },
            { id: 'Rose Bouquet', name: 'Rose Bouquet', price: 75 },
            { id: 'Tulip Bouquet', name: 'Tulip Bouquet', price: 85 }
        ];

        allProducts.forEach(p => {
            let qty = parseInt(localStorage.getItem(p.id)) || 0;
            if (qty > 0) {
                let cost = qty * p.price;
                total += cost;
                html += `
                    <div style="display:flex; justify-content:space-between; padding: 5px 0; border-bottom: 1px solid #eee;">
                        <span>${p.name} (x${qty})</span>
                        <span>${cost} SR</span>
                    </div>`;
            }
        });

        listDiv.innerHTML = html || "<p style='text-align:center; color:#999;'>Your cart is empty! 🌸</p>";
        
        if (total > 0) {
            listDiv.innerHTML += `
                <div style="text-align:right; font-weight:bold; margin-top:10px; color: #d63384;">
                    Total: ${total} SR
                </div>`;
        }
    }

    // 3. دالة إرسال الطلب للكلاود (Confirm Order)
    async function sendOrderToCloud() {
        const phone = document.getElementById('phone-input').value;
        const locationInput = document.getElementById('location-input').value;
        const payment = document.getElementById('payment-input').value;
        const statusText = document.getElementById('order-status');
        const btn = document.getElementById('order-btn');
        const paymentsList = document.getElementById('payments-list');

        if (!phone || !locationInput) {
            alert("Please enter your phone number and location! 🌸");
            return;
        }

        let myOrder = [];
        const allProducts = ['qty_balloons1', 'qty_balloons2', 'Pink Tulip', 'Lily', 'Sunflower', 'White Tulip', 'Rose Bouquet', 'Tulip Bouquet'];
        
        allProducts.forEach(id => {
            let qty = parseInt(localStorage.getItem(id)) || 0;
            if (qty > 0) {
                myOrder.push({ name: id, quantity: qty });
            }
        });

        if (myOrder.length === 0) {
            alert("Cart is empty!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Sending... ⌛";

        try {
            await addDoc(collection(db, "Orders"), {
                customerPhone: phone,
                customerLocation: locationInput,
                paymentMethod: payment,
                items: myOrder,
                timestamp: new Date().toLocaleString(),
                status: "New Order"
            });

            statusText.innerText = "Success! Order sent to Cloud ✅";
            statusText.style.color = "green";

            // تحديث السجل الوردي
            const newEntry = `<li>Date: ${new Date().toLocaleTimeString()} | Status: Paid ✅</li>`;
            paymentsList.innerHTML = newEntry + (paymentsList.innerHTML.includes("No orders") ? "" : paymentsList.innerHTML);

            alert("Thank you! Order confirmed.");
            localStorage.clear();
            setTimeout(() => window.location.reload(), 3000);

        } catch (e) {
            console.error("Error: ", e);
            statusText.innerText = "Error! Try again. ❌";
            btn.disabled = false;
        }
    }

    // ربط الدوال بالنافذة عشان تشتغل مع أزرار الـ HTML
    window.onload = loadFullCart;
    window.sendOrderToCloud = sendOrderToCloud;

</script>
