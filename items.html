<!DOCTYPE html>
<html>

<head>
<title>Other Items</title>

<style>

body{
font-family: Arial;
background-color:#ffffff;
margin:40px;
}

h1{
color:#f2a3b3;
}

h3{
color:#444;
}

.item{
margin-bottom:40px;
}

img{
width:140px;
display:block;
margin-top:10px;
}

button{
width:30px;
height:30px;
margin:5px;
}

a{
display:block;
margin-top:30px;
}

</style>

</head>


<body>

<h1>Other Items...</h1>

<h3>cards & Balloons, ect!</h3>

<p>customized cards also available.. you can make your OWN !!</p>


<div class="item">


<div style="margin-bottom: 30px; border: 1px solid #f2a3b3; padding: 15px; border-radius: 10px;">
        <img src="balloons.jpg" style="width:150px; border-radius:10px;">
        <p><b>Multicolor Balloon</b></p>
        <p>Price: 20 SR</p>
        <button onclick="changeQty1(1)">+</button>
        <span id="qty1" style="font-weight:bold; margin:0 10px;">0</span>
        <button onclick="changeQty1(-1)">-</button>
    </div>

    <div style="margin-bottom: 30px; border: 1px solid #f2a3b3; padding: 15px; border-radius: 10px;">
        <img src="ballons.jpg" style="width:150px; border-radius:10px;">
        <p><b>Party Balloons</b></p>
        <p>Price: 20 SR</p>
        <button onclick="changeQty2(1)">+</button>
        <span id="qty2" style="font-weight:bold; margin:0 10px;">0</span>
        <button onclick="changeQty2(-1)">-</button>
    </div>

    <br>
    <a href="flora.html" style="text-decoration:none; color:#c05a7a; font-weight:bold;">Back to Home</a>

    <script>
    <script>
    // 1. عند فتح الصفحة، نسحب القيم المحفوظة في المتصفح أو نبدأ بصفر
    let q1 = parseInt(localStorage.getItem('qty_balloons1')) || 0;
    let q2 = parseInt(localStorage.getItem('qty_balloons2')) || 0;

    // 2. تحديث الأرقام على الشاشة فوراً
    document.getElementById('qty1').innerText = q1;
    document.getElementById('qty2').innerText = q2;

    // برمجة المنتج الأول
    function changeQty1(amount) {
        if (q1 + amount >= 0) {
            q1 += amount;
            document.getElementById('qty1').innerText = q1;
            // 3. حفظ القيمة الجديدة في الذاكرة
            localStorage.setItem('qty_balloons1', q1);
        }
    }

    // برمجة المنتج الثاني
    function changeQty2(amount) {
        if (q2 + amount >= 0) {
            q2 += amount;
            document.getElementById('qty2').innerText = q2;
            // 4. حفظ القيمة الجديدة في الذاكرة
            localStorage.setItem('qty_balloons2', q2);
        }
    }
</script>
</body>
</html>
