<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px;
            background-color: #c05a7a;
            color: white;
            border: none;
            cursor: pointer;
        }

        h1 {
            color: #c05a7a;
        }
    </style>
</head>

<body>

<h1>Register</h1>

<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>
<input type="password" id="confirm" placeholder="Confirm Password"><br>

<button onclick="register()">Register</button>
<p id="msg"></p>
<br><a href="flora.html" style="color: #c05a7a; text-decoration: none; font-size: 0.9em;">🏠 Back to Home</a>
<script>
function register() {
    var u = document.getElementById("user").value;
    var p = document.getElementById("pass").value;
    var c = document.getElementById("confirm").value;

    if (u === "" || p === "" || c === "") {
        document.getElementById("msg").innerHTML = "Fill all fields";
    }
    else if (p !== c) {
        document.getElementById("msg").innerHTML = "Passwords do not match";
    }
    else {
        document.getElementById("msg").innerHTML = "Registered successfully!";
        
        // يرجعك لصفحة تسجيل الدخول
        setTimeout(function(){
            window.location.href = "index.html";
        }, 1500);
    }
}
</script>

</body>
</html>
