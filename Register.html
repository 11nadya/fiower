<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        input {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px;
            background-color: #c05a7a;
            color: white;
            border: none;
            cursor: pointer;
        }

        h1 {
            color: #c05a7a;
        }
    </style>
</head>

<body>

<h1>Register</h1>

<input type="text" id="user" placeholder="Username"><br>
<input type="password" id="pass" placeholder="Password"><br>
<input type="password" id="confirm" placeholder="Confirm Password"><br>

<button onclick="register()">Register</button>

<p id="msg"></p>

<br>
<a href="index.html" style="color: #c05a7a; text-decoration: none; font-size: 0.9em;">
🏠 Back to Login
</a>

<script type="module">

/* Firebase imports */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    getDocs
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";


/* Firebase project config */
const firebaseConfig = {
    apiKey: "AIzaSyDbtxONOkbqmuGu00JH9d94f9iTwoP4HNs",
    authDomain: "flower-shop-9eace.firebaseapp.com",
    projectId: "flower-shop-9eace",
    storageBucket: "flower-shop-9eace.firebasestorage.app",
    messagingSenderId: "837971089886",
    appId: "1:837971089886:web:a997cd377acb5b7af5e54f"
};


/* Start Firebase */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* Register function */
window.register = async function () {

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;
    let c = document.getElementById("confirm").value;
    let msg = document.getElementById("msg");

    /* Empty fields check */
    if (u === "" || p === "" || c === "") {
        msg.style.color = "red";
        msg.innerHTML = "Fill all fields";
        return;
    }

    /* Password match check */
    if (p !== c) {
        msg.style.color = "red";
        msg.innerHTML = "Passwords do not match";
        return;
    }

    try {
        /* Check if username already exists */
        const querySnapshot = await getDocs(collection(db, "users"));

        let userExists = false;

        querySnapshot.forEach((doc) => {
            const data = doc.data();

            if (data.username === u) {
                userExists = true;
            }
        });

        if (userExists) {
            msg.style.color = "red";
            msg.innerHTML = "Username already exists";
            return;
        }

        /* Save new user to Firestore */
        await addDoc(collection(db, "users"), {
            username: u,
            password: p,
            createdAt: new Date().toLocaleString()
        });

        msg.style.color = "green";
        msg.innerHTML = "Registered successfully! Redirecting...";

        setTimeout(function () {
            window.location.href = "index.html";
        }, 1500);

    } catch (error) {
        console.error("Error:", error);
        msg.style.color = "red";
        msg.innerHTML = "Cloud connection failed";
    }
};

</script>

</body>
</html>
