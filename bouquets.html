<!DOCTYPE html>
<html>

<head>
<title>Bouquets</title>

<style>

body{
font-family: Arial;
background-color:#ffffff;
margin:40px;
}

h1{
color:#f2a3b3;
}

img{
width:140px;
display:block;
margin-top:10px;
}

.item{
margin-bottom:40px;
}

button{
width:30px;
height:30px;
margin:5px;
}

</style>

</head>


<body>

<h1>Bouquets</h1>

<div style="text-align: center; padding: 15px; background-color: #fff5f7; border-radius: 10px; margin-bottom: 20px;">
        <a href="cart.html" style="text-decoration: none; color: #c05a7a; font-weight: bold; font-size: 1.2em;">
            🛒 View My Shopping Cart
        </a>
    </div>

    <div class="item" style="border: 1px solid #f2a3b3; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center;">
        <img src="rose.jpg" style="width:150px; border-radius:10px;">
        <p><b>Rose Bouquet</b></p>
        <p>Price: 75 SR</p>
        <button onclick="changeBouquet('Rose Bouquet', 1)">+</button>
        <span id="Rose Bouquet-qty" style="font-weight:bold; margin:0 10px;">0</span>
        <button onclick="changeBouquet('Rose Bouquet', -1)">-</button>
    </div>

    <div class="item" style="border: 1px solid #f2a3b3; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center;">
        <img src="tulipb.jpg" style="width:150px; border-radius:10px;">
        <p><b>Tulip Bouquet</b></p>
        <p>Price: 85 SR</p>
        <button onclick="changeBouquet('Tulip Bouquet', 1)">+</button>
        <span id="Tulip Bouquet-qty" style="font-weight:bold; margin:0 10px;">0</span>
        <button onclick="changeBouquet('Tulip Bouquet', -1)">-</button>
    </div>

    <br>
    <a href="flora.html" style="text-decoration:none; color:#c05a7a; font-weight:bold;">Back to Home</a>

    <script>
        function changeBouquet(name, amount) {
            let qty = parseInt(localStorage.getItem(name)) || 0;
            if (qty + amount >= 0) {
                qty += amount;
                localStorage.setItem(name, qty);
                document.getElementById(name + '-qty').innerText = qty;
            }
        }

        // تحديث الأرقام عند فتح الصفحة
        window.onload = function() {
            document.getElementById('Rose Bouquet-qty').innerText = localStorage.getItem('Rose Bouquet') || 0;
            document.getElementById('Tulip Bouquet-qty').innerText = localStorage.getItem('Tulip Bouquet') || 0;
        }
    </script>
</body>
</html>
