<!DOCTYPE html>
<html>

<head>
<title>Single Flowers</title>

<style>

body{
font-family: Arial;
background-color:#ffffff;
margin:40px;
}

h1{
color:#f2a3b3;
}

h2{
color:#f2a3b3;
}

.flower{
margin-bottom:40px;
}

img{
width:120px;
display:block;
margin-top:10px;
}

button{
width:30px;
height:30px;
margin:5px;
}
a{
display:block;
margin-top:30px;
}
</style>
</head>
<body>
<h1>Single Flowers...</h1>
<h3>Available Flower Types</h3>
<div class="flower">
<img src="tulip.jpg" width="150">
<button onclick="addToCart('Pink Tulip', 10)">+</button>
<button onclick="removeFromCart('Pink Tulip')">-</button>
<p><b>Pink tulip</b></p>
<p>Price: SR10</p>
</div>
<div class="flower">
<img src="lily.jpg" width="150">
<button onclick="addToCart('Lily', 15)">+</button>
<button onclick="removeFromCart('Lily')">-</button>
<p><b>Lily</b></p>
<p>Price: SR15</p>
</div>
<div class="flower">
<img src="sunflower.jpg" width="150">
<button onclick="addToCart('Sunflower', 15)">+</button>
<button onclick="removeFromCart('Sunflower')">-</button>
<p><b>Sunflower</b></p>
<p>Price: SR15</p>
</div>
<div class="flower">
<img src="white.jpg" width="150">
<button onclick="addToCart('White Tulip', 10)">+</button>
<button onclick="removeFromCart('White Tulip')">-</button>
<p><b>White Tulip</b></p>
<p>Price: SR10</p>
</div>
<a href="flora.html">Back to Home</a>
<hr>
<div id="cart-section" style="padding: 20px; background: #fff5f5; border-radius: 10px; margin-top: 20px; border: 2px dashed #f2a3b3;">
<h3 style="color: #f2a3b3;">🛒 Your Shopping Cart</h3>  
    <ul id="cart-items" style="list-style: none; padding: 0;">
        </ul>
<p style="font-size: 1.2em;"><b>Total Price:</b> SR <span id="total-price" style="color: #f2a3b3;">0</span></p>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    updateCartDisplay();
}

function removeFromCart(name) {
    const index = cart.findIndex(item => item.name === name);
    if (index > -1) {
        total -= cart[index].price;
        cart.splice(index, 1);
        updateCartDisplay();
    }
}

function updateCartDisplay() {
    const cartList = document.getElementById('cart-items');
    const totalDisplay = document.getElementById('total-price');
    
    cartList.innerHTML = '';
    cart.forEach(item => {
        const li = document.createElement('li');
        li.style.padding = "5px 0";
        li.textContent = item.name + " : SR " + item.price;
        cartList.appendChild(li);
    });
    
    totalDisplay.textContent = total;
}
</script>
</body>
</html>
